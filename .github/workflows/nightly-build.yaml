name: Nightly Build

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-build
  cancel-in-progress: true

permissions: {}

env:
  REGISTRY: ghcr.io
  CHARTS_REPO: ${{ github.repository_owner }}/charts
  VALUES_FILE: values/development/values.yaml
  # Single source of truth for submodule components: repo, image, path, tag-mode (tag|inline), chart-path
  COMPONENTS: >-
    osac-operator:osac-operator:base/osac-operator:tag:base/osac-operator/charts/operator
    fulfillment-service:fulfillment-service:base/osac-fulfillment-service:inline:base/osac-fulfillment-service/charts/service
    osac-aap:osac-aap:base/osac-aap:inline:base/osac-aap/charts/aap
    bare-metal-fulfillment-operator:bare-metal-fulfillment-operator:base/bare-metal-fulfillment-operator:tag:base/bare-metal-fulfillment-operator/charts/operator
    osac-ui:osac-ui:base/osac-ui:inline:base/osac-ui/charts/ui
  # CRD charts: name, submodule path, chart path (no image, so no tag-mode field)
  CRD_CHARTS: >-
    osac-operator-crds:base/osac-operator:base/osac-operator/charts/operator-crds
    bare-metal-fulfillment-operator-crds:base/bare-metal-fulfillment-operator:base/bare-metal-fulfillment-operator/charts/operator-crds

jobs:
  # -------------------------------------------------------------------
  # Job 1: Bump submodules and push to a temporary branch for E2E testing
  # -------------------------------------------------------------------
  prepare:
    name: Prepare nightly state
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      base-version: ${{ steps.version.outputs.base-version }}
      nightly-suffix: ${{ steps.version.outputs.nightly-suffix }}
      temp-branch: ${{ steps.push.outputs.branch }}
      temp-sha: ${{ steps.push.outputs.sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      with:
        submodules: recursive
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update submodules to latest main
      run: |
        set -euo pipefail
        check_image() {
          local repo=$1
          local image=$2
          local sha
          sha=$(git -c http.lowSpeedLimit=1000 -c http.lowSpeedTime=10 \
            ls-remote "https://github.com/osac-project/${repo}.git" refs/heads/main | cut -f1)
          local tag="sha-${sha:0:7}"
          local token
          token=$(curl -sf --max-time 15 "https://ghcr.io/token?scope=repository:osac-project/${image}:pull" | jq -r .token)
          local code
          code=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/osac-project/${image}/manifests/${tag}")
          if [[ "${code}" != "200" ]]; then
            echo "WARN: ${repo} main HEAD ${sha:0:7} has no published image (tag ${tag}), keeping pinned submodule" >&2
            return 1
          fi
          echo "${sha}"
        }

        for entry in ${COMPONENTS}; do
          repo="${entry%%:*}"
          rest="${entry#*:}"
          image="${rest%%:*}"
          rest="${rest#*:}"
          path="${rest%%:*}"

          sha=$(check_image "${repo}" "${image}") || continue
          current=$(git -C "${path}" rev-parse HEAD)
          if [[ "${current}" != "${sha}" ]]; then
            git -C "${path}" -c http.lowSpeedLimit=1000 -c http.lowSpeedTime=10 fetch origin
            git -C "${path}" checkout "${sha}"
            echo "${repo}: updated ${current:0:7} -> ${sha:0:7}"
          else
            echo "${repo}: already at ${sha:0:7}"
          fi
        done

    - name: Sync image tags
      run: ./scripts/sync-image-tags.sh --fix

    - name: Push temporary branch
      id: push
      run: |
        set -euo pipefail
        DATE=$(date -u +%Y%m%d)
        SHORT_SHA=$(git rev-parse --short=7 HEAD)
        # Include the run ID (unique per workflow run) and run attempt
        # (increments on "Re-run failed jobs", where the run ID itself
        # stays the same) so no combination of same-day manual re-run,
        # whether a fresh dispatch or an in-place re-run, can ever collide
        # with an existing branch — a plain date+sha name is only unique
        # if main has advanced since the last run, which isn't true for
        # either case and causes a non-fast-forward push rejection.
        BRANCH="nightly/${DATE}-${SHORT_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b "${BRANCH}"
        git add -A
        git diff --cached --quiet || git commit -m "nightly: bump submodules to latest main"

        git push origin "${BRANCH}"
        COMMIT_SHA=$(git rev-parse HEAD)

        echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
        echo "sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
        echo "Pushed temp branch: ${BRANCH} (${COMMIT_SHA})"

    - name: Generate nightly version
      id: version
      env:
        COMMIT_SHA: ${{ steps.push.outputs.sha }}
      run: |
        set -euo pipefail
        source ./scripts/lib.sh
        DATE=$(date -u +%Y%m%d)
        SHORT_SHA="${COMMIT_SHA:0:7}"
        # GITHUB_RUN_NUMBER, like GITHUB_RUN_ID, stays constant across a
        # "Re-run failed jobs" of the same run — only GITHUB_RUN_ATTEMPT
        # increments there. Without it, re-running the same failed run
        # would produce the identical chart version string, matching the
        # temp-branch collision fixed above.
        NIGHTLY_SUFFIX="nightly.${DATE}.${SHORT_SHA}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

        # Use the umbrella chart's own latest real release tag (not the
        # Chart.yaml placeholder, which is never bumped) so the nightly
        # version reflects where this build actually sits relative to
        # real releases.
        BASE_TAG=$(resolve_release_tag .)
        BASE_VERSION="${BASE_TAG#v}"
        VERSION="${BASE_VERSION}-${NIGHTLY_SUFFIX}"

        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "base-version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
        echo "nightly-suffix=${NIGHTLY_SUFFIX}" >> "$GITHUB_OUTPUT"
        echo "Nightly version: ${VERSION} (base: ${BASE_VERSION})"

  # -------------------------------------------------------------------
  # Job 2: Run E2E tests against the temporary branch
  # -------------------------------------------------------------------
  e2e-test:
    name: E2E validation
    needs: prepare
    permissions:
      contents: read
    uses: osac-project/osac-test-infra/.github/workflows/e2e-vmaas-full-install.yml@cf738faa86961fd8509697d2caa9613310a921a6  # main
    with:
      test-suite: vmaas
      installer-repo: ${{ github.repository }}
      installer-ref: ${{ needs.prepare.outputs.temp-branch }}
      test-infra-repository: osac-project/osac-test-infra
      test-infra-ref: main

  # -------------------------------------------------------------------
  # Job 3: Publish charts (only if E2E passes)
  # -------------------------------------------------------------------
  publish:
    name: Publish nightly charts
    needs: [prepare, e2e-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Push/pull chart OCI artifacts to GHCR
      packages: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BASE_VERSION: ${{ needs.prepare.outputs.base-version }}
      NIGHTLY_SUFFIX: ${{ needs.prepare.outputs.nightly-suffix }}

    steps:
    - name: Checkout temporary branch
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      with:
        ref: ${{ needs.prepare.outputs.temp-branch }}
        submodules: recursive
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: false

    - name: Set up Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
      with:
        version: v3.17.0

    - name: Set up chart-testing
      uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f  # v2.8.0

    - name: Log in to GHCR
      env:
        GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GHCR_USER: ${{ github.actor }}
      run: printf '%s' "${GHCR_TOKEN}" | helm registry login "${{ env.REGISTRY }}" -u "${GHCR_USER}" --password-stdin

    - name: Compute per-chart versions
      run: ./scripts/generate-chart-versions.sh

    - name: Upload chart-versions.txt
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: chart-versions-${{ needs.prepare.outputs.version }}
        path: chart-versions.txt
        retention-days: 1

    - name: Publish component charts
      env:
        OCI_REPO: oci://${{ env.REGISTRY }}/${{ env.CHARTS_REPO }}
      run: |
        set -euo pipefail
        get_version() { ./scripts/get-chart-version.sh "$1"; }
        published=""

        for entry in ${CRD_CHARTS}; do
          chart_name="${entry%%:*}"
          rest="${entry#*:}"
          chart_path="${rest#*:}"
          version=$(get_version "${chart_name}")
          echo "--- Publishing ${chart_name} (${version}) ---"
          helm package "${chart_path}" --version "${version}"
          helm push "${chart_name}-${version}.tgz" "${OCI_REPO}"
          published="${published}\n${chart_name}:${version}"
        done

        for entry in ${COMPONENTS}; do
          component="${entry%%:*}"
          rest="${entry#*:}"
          rest="${rest#*:}"
          rest="${rest#*:}"
          chart_path="${rest#*:}"
          version=$(get_version "${component}")
          echo "--- Publishing ${component} (${version}) ---"
          helm package "${chart_path}" --version "${version}"
          helm push "${component}-${version}.tgz" "${OCI_REPO}"
          published="${published}\n${component}:${version}"
        done

        echo -e "Published charts:${published}"

    - name: Verify component chart publications
      env:
        OCI_REPO: oci://${{ env.REGISTRY }}/${{ env.CHARTS_REPO }}
      run: |
        set -euo pipefail
        get_version() { ./scripts/get-chart-version.sh "$1"; }
        for entry in ${CRD_CHARTS}; do
          chart_name="${entry%%:*}"
          version=$(get_version "${chart_name}")
          echo "Verifying ${chart_name} (${version})..."
          helm show chart "${OCI_REPO}/${chart_name}" --version "${version}"
        done
        for entry in ${COMPONENTS}; do
          component="${entry%%:*}"
          version=$(get_version "${component}")
          echo "Verifying ${component} (${version})..."
          helm show chart "${OCI_REPO}/${component}" --version "${version}"
        done

    - name: Rewrite umbrella chart to use published components
      env:
        OCI_REPO: oci://${{ env.REGISTRY }}/${{ env.CHARTS_REPO }}
      run: |
        set -euo pipefail
        GET_VERSION_SCRIPT="$(pwd)/scripts/get-chart-version.sh"
        CHART_VERSIONS_FILE="$(pwd)/chart-versions.txt"
        get_version() { "${GET_VERSION_SCRIPT}" "$1" 1 "${CHART_VERSIONS_FILE}"; }
        cd charts/osac

        for entry in ${CRD_CHARTS}; do
          chart_name="${entry%%:*}"
          version=$(get_version "${chart_name}")
          yq -i "(.dependencies[] | select(.name == \"${chart_name}\")).repository = \"${OCI_REPO}\"" Chart.yaml
          yq -i "(.dependencies[] | select(.name == \"${chart_name}\")).version = \"${version}\"" Chart.yaml
        done
        for entry in ${COMPONENTS}; do
          component="${entry%%:*}"
          version=$(get_version "${component}")
          yq -i "(.dependencies[] | select(.name == \"${component}\")).repository = \"${OCI_REPO}\"" Chart.yaml
          yq -i "(.dependencies[] | select(.name == \"${component}\")).version = \"${version}\"" Chart.yaml
        done

        rm -f Chart.lock

        echo "--- Updated Chart.yaml ---"
        cat Chart.yaml

    - name: Build umbrella chart dependencies from OCI
      run: helm dependency build charts/osac/

    - name: Update image tags to submodule SHAs
      run: |
        set -euo pipefail
        for entry in ${COMPONENTS}; do
          component="${entry%%:*}"
          rest="${entry#*:}"
          rest="${rest#*:}"
          submodule_path="${rest%%:*}"
          mode="${rest#*:}"
          mode="${mode%%:*}"

          sha=$(git -C "${submodule_path}" rev-parse HEAD 2>/dev/null) || continue
          tag="sha-${sha:0:7}"

          if [[ "${mode}" == "tag" ]]; then
            sed -i "/repository: ghcr.io\/osac-project\/${component}$/{n;s|tag: .*|tag: ${tag}|}" \
              charts/osac/values.yaml
          else
            sed -i "s|${component}:latest|${component}:${tag}|g" charts/osac/values.yaml
          fi
          echo "${component}: ${tag}"
        done

        echo "--- Updated values.yaml image tags ---"
        grep -E '(repository:|tag:|fulfillment-service:|osac-aap:)' charts/osac/values.yaml || true

    - name: Lint chart
      run: ct lint --all --config ct.yaml

    - name: Package umbrella chart
      run: |
        helm package charts/osac/ \
          --version "${VERSION}" \
          --app-version "${VERSION}"

    - name: Push umbrella chart to GHCR
      env:
        OCI_REPO: oci://${{ env.REGISTRY }}/${{ env.CHARTS_REPO }}
      run: |
        helm push "osac-${VERSION}.tgz" "${OCI_REPO}"

    - name: Verify umbrella chart publication
      env:
        OCI_REPO: oci://${{ env.REGISTRY }}/${{ env.CHARTS_REPO }}
      run: |
        echo "Verifying umbrella chart was published successfully..."
        helm show chart "${OCI_REPO}/osac" --version "${VERSION}"

    - name: Generate images.txt
      env:
        REPO_OWNER: ${{ github.repository_owner }}
      run: |
        set -euo pipefail
        helm template osac "osac-${VERSION}.tgz" \
          --values "${VALUES_FILE}" \
          --set service.externalHostname=placeholder.example.com \
          --set service.internalHostname=placeholder-internal.example.com \
        | grep -oP 'image:\s*\K\S+' \
        | tr -d '"' \
        | sort -u \
        > images-raw.txt || true

        if ! test -s images-raw.txt; then
          echo "ERROR: images.txt is empty — helm template or image extraction failed"
          exit 1
        fi

        for entry in ${COMPONENTS}; do
          component="${entry%%:*}"
          rest="${entry#*:}"
          rest="${rest#*:}"
          submodule_path="${rest%%:*}"
          sha=$(git -C "${submodule_path}" rev-parse HEAD 2>/dev/null) || continue
          sed -i "s|${component}:latest|${component}:sha-${sha:0:7}|g" images-raw.txt
        done

        > images.txt
        for entry in ${COMPONENTS}; do
          component="${entry%%:*}"
          grep "${component}:" images-raw.txt >> images.txt || true
        done
        grep -v -F -f images.txt images-raw.txt | sort >> images.txt || true

        get_version() { ./scripts/get-chart-version.sh "$1" 1; }
        get_source_tag() { ./scripts/get-chart-version.sh "$1" 2; }
        get_source_sha() { ./scripts/get-chart-version.sh "$1" 3; }
        OCI_BASE="${REGISTRY}/${REPO_OWNER}/charts"
        echo "" >> images.txt
        echo "# Chart source & versions" >> images.txt
        for entry in ${CRD_CHARTS}; do
          chart_name="${entry%%:*}"
          chart_version=$(get_version "${chart_name}")
          src_tag=$(get_source_tag "${chart_name}")
          src_sha=$(get_source_sha "${chart_name}")
          echo "# ${chart_name}: source=${src_tag} (${src_sha}), chart=oci://${OCI_BASE}/${chart_name}:${chart_version}" >> images.txt
        done
        for entry in ${COMPONENTS}; do
          component="${entry%%:*}"
          chart_version=$(get_version "${component}")
          src_tag=$(get_source_tag "${component}")
          src_sha=$(get_source_sha "${component}")
          echo "# ${component}: source=${src_tag} (${src_sha}), chart=oci://${OCI_BASE}/${component}:${chart_version}" >> images.txt
        done
        UMBRELLA_SHA=$(git rev-parse --short=7 HEAD 2>/dev/null || echo "unknown")
        echo "# osac: source=v${BASE_VERSION} (${UMBRELLA_SHA}), chart=oci://${OCI_BASE}/osac:${VERSION}" >> images.txt

        rm -f images-raw.txt

        echo "--- images.txt ---"
        cat images.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: nightly-${{ needs.prepare.outputs.version }}
        path: |
          osac-${{ needs.prepare.outputs.version }}.tgz
          images.txt
        retention-days: 14

  # -------------------------------------------------------------------
  # Job 4: Tag and send success notification
  # -------------------------------------------------------------------
  tag-and-notify:
    name: Tag and notify
    needs: [prepare, publish]
    runs-on: osac-ci
    if: success()
    permissions:
      # Create nightly git tags and delete temp branch
      contents: write
      # Look up package version URLs for the Slack notification
      packages: read
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TEMP_BRANCH: ${{ needs.prepare.outputs.temp-branch }}

    steps:
    - name: Checkout temporary branch
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      with:
        ref: ${{ needs.prepare.outputs.temp-branch }}
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download chart-versions.txt
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: chart-versions-${{ needs.prepare.outputs.version }}

    - name: Create nightly tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        TAG="v${VERSION}"
        git tag "${TAG}" -m "Nightly build ${VERSION}"
        git push origin "${TAG}"
        echo "Tagged: ${TAG}"

    - name: Delete temporary branch
      run: git push origin --delete "${TEMP_BRANCH}" || true

    - name: Read AppRole credentials
      id: approle
      run: |
        APPROLE_DIR="${HOME}/.vault-server/.approle"
        echo "role-id=$(cat "${APPROLE_DIR}/role-id")" >> "$GITHUB_OUTPUT"
        echo "::add-mask::$(cat "${APPROLE_DIR}/secret-id")"
        echo "secret-id=$(cat "${APPROLE_DIR}/secret-id")" >> "$GITHUB_OUTPUT"

    - name: Retrieve Slack webhook from Vault
      id: vault
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc  # v4
      with:
        url: http://127.0.0.1:8200
        method: approle
        roleId: ${{ steps.approle.outputs.role-id }}
        secretId: ${{ steps.approle.outputs.secret-id }}
        exportEnv: false
        secrets: |
          secret/data/osac/e2e/slack-webhook-url url | SLACK_WEBHOOK_URL

    - name: Notify Slack on success
      env:
        SLACK_WEBHOOK_URL: ${{ steps.vault.outputs.SLACK_WEBHOOK_URL }}
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        REPO_OWNER: ${{ github.repository_owner }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        get_version() { ./scripts/get-chart-version.sh "$1"; }

        # Package version pages are keyed by numeric version id, not the
        # tag -- look the id up via the Packages API. Versions are
        # returned newest-first, so the one we just pushed is always near
        # the top of the first page. Without ?tag=, GitHub's UI shows the
        # page titled by digest instead of the human-readable tag (tag is
        # URL-encoded since it ends up in a query string).
        #
        # Best-effort only: GITHUB_TOKEN's packages:read permission is
        # scoped to this repo, and most of these charts are linked to
        # sibling repos (osac-operator, fulfillment-service, etc.), so the
        # lookup may 403. Never let a failed/empty lookup take down the
        # whole notification -- degrade to a plain, unlinked version
        # instead. `|| true` at each call site absorbs curl/jq failures
        # under `set -e`.
        chart_version_url() {
          local chart_name=$1 version=$2
          local encoded_version url
          encoded_version=$(jq -rn --arg v "${version}" '$v|@uri')
          url=$(curl -sf --max-time 15 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${REPO_OWNER}/packages/container/charts%2F${chart_name}/versions?per_page=100" \
          | jq -r --arg v "${version}" '.[] | select(.metadata.container.tags | index($v)) | .html_url' \
          | head -1) || true
          [ -n "${url}" ] && echo "${url}?tag=${encoded_version}"
        }

        declare -a NAMES VERSIONS URLS
        for entry in ${CRD_CHARTS}; do
          chart_name="${entry%%:*}"
          version=$(get_version "${chart_name}")
          NAMES+=("${chart_name}")
          VERSIONS+=("${version}")
          URLS+=("$(chart_version_url "${chart_name}" "${version}" || true)")
        done
        for entry in ${COMPONENTS}; do
          component="${entry%%:*}"
          version=$(get_version "${component}")
          NAMES+=("${component}")
          VERSIONS+=("${version}")
          URLS+=("$(chart_version_url "${component}" "${version}" || true)")
        done
        NAMES+=("osac (umbrella)")
        VERSIONS+=("${VERSION}")
        URLS+=("$(chart_version_url "osac" "${VERSION}" || true)")

        max_len() {
          local max=${#1}
          shift
          for s in "$@"; do
            (( ${#s} > max )) && max=${#s}
          done
          echo "${max}"
        }
        NAME_W=$(max_len "Chart" "${NAMES[@]}")
        VERSION_W=$(max_len "Version" "${VERSIONS[@]}")

        hline() { printf '─%.0s' $(seq 1 "$(($1 + 2))"); }
        name_cell() { printf '%-*s' "${NAME_W}" "$1"; }
        # Padding is based on the visible label length (the plain version
        # string), not the raw <url|label> markup length -- the url, pipe,
        # and angle brackets are invisible once Slack renders the link, so
        # padding on the raw length would misalign the right border.
        version_cell() {
          local version=$1 url=$2
          local pad=$(( VERSION_W - ${#version} ))
          (( pad < 0 )) && pad=0
          if [ -n "${url}" ]; then
            printf '<%s|%s>%*s' "${url}" "${version}" "${pad}" ""
          else
            printf '%s%*s' "${version}" "${pad}" ""
          fi
        }

        TABLE="┌$(hline "${NAME_W}")┬$(hline "${VERSION_W}")┐"
        TABLE="${TABLE}"$'\n'"│ $(name_cell "Chart") │ $(version_cell "Version" "") │"
        TABLE="${TABLE}"$'\n'"├$(hline "${NAME_W}")┼$(hline "${VERSION_W}")┤"
        for i in "${!NAMES[@]}"; do
          TABLE="${TABLE}"$'\n'"│ $(name_cell "${NAMES[$i]}") │ $(version_cell "${VERSIONS[$i]}" "${URLS[$i]}") │"
        done
        TABLE="${TABLE}"$'\n'"└$(hline "${NAME_W}")┴$(hline "${VERSION_W}")┘"

        SUMMARY_TEXT="*Charts published:*"$'\n'"\`\`\`"$'\n'"${TABLE}"$'\n'"\`\`\`"
        WORKFLOW_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

        jq -n \
          --arg version "${VERSION}" \
          --arg summary "${SUMMARY_TEXT}" \
          --arg workflow_url "${WORKFLOW_URL}" \
          '{
            "blocks": [
              {
                "type": "header",
                "text": {"type": "plain_text", "text": (":white_check_mark: Nightly Build " + $version + " - Published")}
              },
              {
                "type": "section",
                "text": {"type": "mrkdwn", "text": $summary}
              },
              {
                "type": "actions",
                "elements": [
                  {"type": "button", "text": {"type": "plain_text", "text": "View Run"}, "url": $workflow_url}
                ]
              }
            ]
          }' > /tmp/slack-payload.json

        curl -sf --max-time 15 -X POST "${SLACK_WEBHOOK_URL}" \
          -H "Content-Type: application/json" \
          -d @/tmp/slack-payload.json

  # -------------------------------------------------------------------
  # Job 5: Notify on failure (temp branch kept for debugging, see
  # cleanup-nightly-branches.yaml for TTL-based removal)
  # -------------------------------------------------------------------
  notify-failure:
    name: Notify failure
    needs: [prepare, e2e-test, publish, tag-and-notify]
    runs-on: osac-ci
    if: failure()

    steps:
    # Note: the temp branch is intentionally NOT deleted here. On failure, no
    # git tag exists to preserve the exact failing state, so the nightly/*
    # branch is the only reference for debugging. It's cleaned up later by
    # cleanup-nightly-branches.yaml (TTL-based, runs daily).
    - name: Read AppRole credentials
      id: approle
      run: |
        APPROLE_DIR="${HOME}/.vault-server/.approle"
        echo "role-id=$(cat "${APPROLE_DIR}/role-id")" >> "$GITHUB_OUTPUT"
        echo "::add-mask::$(cat "${APPROLE_DIR}/secret-id")"
        echo "secret-id=$(cat "${APPROLE_DIR}/secret-id")" >> "$GITHUB_OUTPUT"

    - name: Retrieve Slack webhook from Vault
      id: vault
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc  # v4
      with:
        url: http://127.0.0.1:8200
        method: approle
        roleId: ${{ steps.approle.outputs.role-id }}
        secretId: ${{ steps.approle.outputs.secret-id }}
        exportEnv: false
        secrets: |
          secret/data/osac/e2e/slack-webhook-url url | SLACK_WEBHOOK_URL

    - name: Notify Slack on failure
      env:
        SLACK_WEBHOOK_URL: ${{ steps.vault.outputs.SLACK_WEBHOOK_URL }}
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        WORKFLOW_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

        jq -n \
          --arg branch "${REF_NAME}" \
          --arg workflow_url "${WORKFLOW_URL}" \
          '{
            "blocks": [
              {
                "type": "header",
                "text": {"type": "plain_text", "text": ":x: Nightly Build Failed"}
              },
              {
                "type": "section",
                "text": {"type": "mrkdwn", "text": ("*Branch:* `" + $branch + "`\nPlease investigate the failure.")}
              },
              {
                "type": "actions",
                "elements": [
                  {"type": "button", "text": {"type": "plain_text", "text": "View Run"}, "url": $workflow_url}
                ]
              }
            ]
          }' > /tmp/slack-payload.json

        curl -sf --max-time 15 -X POST "${SLACK_WEBHOOK_URL}" \
          -H "Content-Type: application/json" \
          -d @/tmp/slack-payload.json
