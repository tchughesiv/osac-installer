{{/*
TODO: Remove once the fulfillment-service subchart supports configuring
additional emergency service accounts via values. Currently the AuthConfig
Rego only includes "admin" — the template-publisher and osac-operator SAs
also need emergency admin access for publish-templates and gRPC sync.

This hook runs at weight 5, BEFORE the AAP bootstrap hook (weight 10),
so the AuthConfig is patched before publish-templates runs.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: osac-patch-authconfig
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "osac.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: osac-sa
      containers:
      - name: patch
        image: quay.io/openshift/origin-cli:4.20.0
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        command:
        - python3
        - -c
        - |
          import json
          import subprocess
          import sys
          import time

          NS = "{{ .Release.Namespace }}"
          EXTRA_SAS = ["template-publisher", "osac-operator"]
          TIMEOUT = 300

          print("Waiting for AuthConfig to exist...")
          deadline = time.time() + TIMEOUT
          while True:
              r = subprocess.run(["oc", "get", "authconfig", "fulfillment-service", "-n", NS],
                                 capture_output=True)
              if r.returncode == 0:
                  break
              if time.time() >= deadline:
                  print(f"ERROR: AuthConfig fulfillment-service not found after {TIMEOUT}s", file=sys.stderr)
                  sys.exit(1)
              time.sleep(5)

          result = subprocess.run(
              ["oc", "get", "authconfig", "fulfillment-service", "-n", NS, "-o", "json"],
              capture_output=True, text=True, check=True)
          authconfig = json.loads(result.stdout)
          rego = authconfig["spec"]["authorization"]["default"]["opa"]["rego"]

          changed = False
          for sa in EXTRA_SAS:
              full = f"system:serviceaccount:{NS}:{sa}"
              if full not in rego:
                  rego = rego.replace(
                      f'"system:serviceaccount:{NS}:admin",',
                      f'"system:serviceaccount:{NS}:admin",\n  "{full}",')
                  changed = True
                  print(f"Adding {full}")

          if not changed:
              print("AuthConfig already has all emergency SAs")
              sys.exit(0)

          for sa in EXTRA_SAS:
              full = f"system:serviceaccount:{NS}:{sa}"
              if full not in rego:
                  print(f"ERROR: failed to inject {full} into rego. Current rego:\n{rego}", file=sys.stderr)
                  sys.exit(1)

          authconfig["spec"]["authorization"]["default"]["opa"]["rego"] = rego
          subprocess.run(["oc", "apply", "-f", "-"],
                         input=json.dumps(authconfig), text=True, check=True)
          print("AuthConfig updated")
