apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: osac-e2e-ci

# This applies a name prefix to cluster-scoped resources (ClusterRoles,
# ClusterRoleBindings) but does not modify namespaced resources.
transformers:
- prefixTransformer.yaml

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: kustomize
    environment: ci

resources:
- ../../base
- ./ca-trust-bundle.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
# This expects to find quay credentials in
# files/quay-pull-secret.json.
- name: quay-pull-secret
  files:
  - .dockerconfigjson=files/quay-pull-secret.json
  type: kubernetes.io/dockerconfigjson

# This expects to find an AAP license manifest
# in files/license.zip.
- name: config-as-code-manifest-ig
  files:
    - license.zip=files/license.zip
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: config-as-code-ig
  options:
    disableNameSuffixHash: true
  literals:
    - AAP_EE_IMAGE=ghcr.io/osac-project/osac-aap:sha-86e2f56
    - AAP_PROJECT_GIT_URI=https://github.com/osac-project/osac-aap
    - AAP_PROJECT_GIT_BRANCH=86e2f56aac8b65e98ad3f33407084b4fecd2b4d7

- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap

# Base defaults for the cluster-fulfillment-ig ConfigMap.
# scripts/aap-configuration.sh may override these with values
# from files/osac-aap-configuration.env after oc apply -k.
configMapGenerator:
- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap
  literals:
    - NETWORK_CLASS=esi
    - NETWORK_STEPS_COLLECTION=massopencloud.steps
    - EXTERNAL_ACCESS_BASE_DOMAIN=box.massopen.cloud
    - EXTERNAL_ACCESS_SUPPORTED_BASE_DOMAINS=box.massopen.cloud
    - EXTERNAL_ACCESS_API_INTERNAL_NETWORK=hypershift
    - HOSTED_CLUSTER_BASE_DOMAIN=box.massopen.cloud
    - HOSTED_CLUSTER_CONTROLLER_AVAILABILITY_POLICY=HighlyAvailable
    - HOSTED_CLUSTER_INFRASTRUCTURE_AVAILABILITY_POLICY=HighlyAvailable

- name: publish-templates-ig
  literals:
    - OSAC_TEMPLATE_COLLECTIONS=osac.templates,osac.massopencloud
    - OSAC_FULFILLMENT_SERVICE_URI=https://fulfillment-internal-api:8001

images:
  - name: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    newName: quay.io/openshift/origin-cli
    newTag: "4.20.0"

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fulfillment-controller
      spec:
        template:
          spec:
            containers:
              - name: controller
                imagePullPolicy: Always
  - target:
      kind: Deployment
      name: osac-operator-controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_CLUSTER_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_TENANT_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_NETWORKING_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_MINIMUM_REQUEST_INTERVAL
          value: "2m"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: osac-aap-api-token
              key: token
              optional: true
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_INSECURE_SKIP_VERIFY
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_SERVER_ADDRESS
          value: fulfillment-internal-api:8001
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_TOKEN_FILE
          value: /var/run/secrets/kubernetes.io/serviceaccount/token
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - patch: |
      apiVersion: operator.authorino.kuadrant.io/v1beta1
      kind: Authorino
      metadata:
        name: authorino
      spec:
        volumes:
          items:
          - name: ca-bundle
            configMaps:
            - ca-bundle
            items:
            - key: bundle.pem
              path: ca-bundle.crt
            mountPath: /etc/pki/tls/certs
  # Override issuerUrl (base has :8001, we use port 443 via service mapping)
  # and admin_subjects for osac-e2e-ci namespace
  - patch: |
      apiVersion: authorino.kuadrant.io/v1beta3
      kind: AuthConfig
      metadata:
        name: fulfillment-service
      spec:
        authentication:
          fulfillment-api:
            kubernetesTokenReview:
              audiences:
              - https://kubernetes.default.svc
              - https://kubernetes.default.svc.cluster.local
            metrics: false
            overrides:
              authnMethod:
                value: serviceaccount
            priority: 0
          keycloak-jwt:
            jwt:
              issuerUrl: https://keycloak.keycloak.svc.cluster.local/realms/osac
            metrics: false
            overrides:
              authnMethod:
                value: jwt
            priority: 0
        authorization:
          default:
            metrics: false
            opa:
              allValues: true
              rego: |
                import rego.v1

                # Emergency service accounts are Kubernetes service accounts that are allowed to act as administrators in case
                # of emergency situations where it isn't possible to get a valid JWT token from the identity provider.
                emergency_service_accounts := {
                  "system:serviceaccount:osac-e2e-ci:admin",
                  "system:serviceaccount:osac-e2e-ci:controller",
                  "system:serviceaccount:osac-e2e-ci:template-publisher",
                  "system:serviceaccount:osac-e2e-ci:osac-operator-controller-manager",
                }

                # Admin service accounts are service accounts that are allowed to act as administrators.
                admin_service_accounts := {
                  "service-account-osac-admin",
                  "service-account-osac-controller",
                  "service-account-fulfillment-controller",
                }

                # Admin groups are groups that are allowed to act as administrators.
                admin_groups := {
                  "admins",
                }

                # Get the gRPC method:
                grpc_method := input.context.request.http.path

                # Get the subject name:
                subject_name = input.auth.identity.user.username if {
                  input.auth.identity.authnMethod == "serviceaccount"
                }
                subject_name = input.auth.identity.username if {
                  input.auth.identity.authnMethod == "jwt"
                }

                # Get the subject groups:
                subject_groups = input.auth.identity.user.groups if {
                  input.auth.identity.authnMethod == "serviceaccount"
                }
                subject_groups = input.auth.identity.groups if {
                  input.auth.identity.authnMethod == "jwt"
                }

                # Check if an account is an admin account:
                default is_admin = false
                is_admin if {
                  subject_name in emergency_service_accounts
                }
                is_admin if {
                  subject_name in admin_service_accounts
                }
                is_admin if {
                  some group in subject_groups
                  group in admin_groups
                }

                # Check if an account is a client account:
                default is_client = false
                is_client if {
                  not is_admin
                }

                # Allow metadata, reflection and health to everyone:
                allow if {
                  startswith(grpc_method, "/metadata.")
                }
                allow if {
                  startswith(grpc_method, "/grpc.reflection.")
                }
                allow if {
                  startswith(grpc_method, "/grpc.health.")
                }

                # Allow specific methods to clients:
                allow if {
                  is_client
                  grpc_method in {
                    "/osac.public.v1.ClusterTemplates/Get",
                    "/osac.public.v1.ClusterTemplates/List",
                    "/osac.public.v1.Clusters/Create",
                    "/osac.public.v1.Clusters/Delete",
                    "/osac.public.v1.Clusters/Get",
                    "/osac.public.v1.Clusters/GetKubeconfig",
                    "/osac.public.v1.Clusters/GetKubeconfigViaHttp",
                    "/osac.public.v1.Clusters/GetPassword",
                    "/osac.public.v1.Clusters/GetPasswordViaHttp",
                    "/osac.public.v1.Clusters/List",
                    "/osac.public.v1.Clusters/Update",
                    "/osac.public.v1.Events/Watch",
                  }
                }

                # Allow everything to admins:
                allow if {
                  is_admin
                }
            priority: 0
        hosts:
        - '*'
        response:
          success:
            headers:
              x-subject:
                json:
                  properties:
                    tenants:
                      expression: |
                        auth.authorization.default.is_admin
                          ? ["*"]
                          : auth.identity.authnMethod == "jwt"
                            ? auth.identity.groups
                            : [auth.identity.user.username.split(":")[2]]
                    user:
                      expression: |
                        auth.identity.authnMethod == "jwt"
                          ? auth.identity.username
                          : auth.identity.user.username.split(":")[3]
                metrics: false
                priority: 0
