{{- if .Values.lvms.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osac-prereqs-configure-lvms
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: osac-prereqs-configure-lvms
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "10"
rules:
  - apiGroups: ["operators.coreos.com"]
    resources: ["clusterserviceversions"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["lvm.topolvm.io"]
    resources: ["lvmclusters"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: osac-prereqs-configure-lvms
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: osac-prereqs-configure-lvms
subjects:
  - kind: ServiceAccount
    name: osac-prereqs-configure-lvms
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: osac-prereqs-configure-lvms
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "10"
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "osac-prereqs.hookLabels" . | nindent 8 }}
    spec:
      serviceAccountName: osac-prereqs-configure-lvms
      restartPolicy: OnFailure
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: osac-prereqs-lvms-config
        - name: scripts
          configMap:
            name: osac-prereqs-hook-scripts
      containers:
        - name: configure-lvms
          image: {{ .Values.cliImage }}
          env:
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /config
            - name: scripts
              mountPath: /scripts
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command:
            - /bin/bash
            - /scripts/configure-lvms.sh
{{- end }}
